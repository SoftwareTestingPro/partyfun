name: party_games
description: "The ultimate collection of social party games for everyone. Includes truth or dare, party cards, bottle spinner, and more fun games."
publish_to: 'none'

version: 1.1.0+3

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.1.0
  shared_preferences: ^2.5.1
  animate_do: ^3.3.4
  wakelock_plus: ^1.2.11
  audioplayers: ^6.6.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/tasks/
    - assets/punishments/
    - assets/images/
    - assets/sounds/

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
